<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Dashboard — AI Team</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#313338;
  --bg-secondary:#2b2d31;
  --bg-tertiary:#1e1f22;
  --bg-hover:#3c3f45;
  --bg-active:#404249;
  --bg-section:#2b2d31;
  --text-normal:#dbdee1;
  --text-muted:#949ba4;
  --text-link:#00a8fc;
  --text-positive:#23a55a;
  --text-warning:#f0b232;
  --text-danger:#f23f42;
  --header-primary:#f2f3f5;
  --header-secondary:#b5bac1;
  --channel-default:#949ba4;
  --channel-hover:#dbdee1;
  --channel-active:#dbdee1;
  --brand:#5865f2;
  --brand-hover:#4752c4;
  --brand-500:#5865f2;
  --green-360:#23a55a;
  --green-430:#248046;
  --red-400:#f23f42;
  --red-430:#c73e3f;
  --yellow-300:#f0b232;
  --yellow-360:#d48d2b;
  --status-online:#23a55a;
  --status-idle:#f0b232;
  --status-dnd:#f23f42;
  --status-offline:#80848e;
  --scrollbar-thin:4px;
  --font-primary:'gg sans','Segoe UI','Helvetica Neue','Helvetica','Arial',sans-serif;
  --font-code:'Consolas','Courier New','monospace';
  --header-height:48px;
  --sidebar-width:240px;
  --member-width:240px;
}
html,body{height:100%;background:var(--bg-tertiary);color:var(--text-normal);font-family:var(--font-primary);font-size:15px;line-height:1.5;overflow:hidden}
.app-layout{display:flex;height:100vh;width:100vw}
/* Guild sidebar */
.guild-sidebar{width:72px;background:var(--bg-tertiary);display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:8px;flex-shrink:0;overflow-y:auto}
.guild-icon{width:48px;height:48px;border-radius:24px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;cursor:pointer;transition:border-radius .15s;position:relative}
.guild-icon:hover{border-radius:16px}
.guild-icon.active{border-radius:16px;background:var(--brand)}
.guild-icon::after{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:8px;height:40px;border-radius:0 4px 4px 0;background:#fff;opacity:0;transition:opacity .1s}
.guild-icon.active::after,.guild-icon:hover::after{opacity:1}
.guild-divider{width:32px;height:2px;background:#3c3f45;border-radius:1px;margin:4px 0}
.guild-online{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;border-radius:50%;background:var(--status-online);border:3px solid var(--bg-tertiary)}
/* Channel sidebar */
.channel-sidebar{width:var(--sidebar-width);background:var(--bg-secondary);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.channel-header{height:var(--header-height);padding:0 16px;display:flex;align-items:center;border-bottom:1px solid var(--bg-tertiary);font-weight:600;color:var(--header-primary);cursor:pointer;flex-shrink:0}
.channel-header:hover{background:var(--bg-hover)}
.channel-header .header-arrow{font-size:12px;margin-right:8px;color:var(--text-muted)}
.channel-scroll{padding:8px 8px 16px;overflow-y:auto;flex:1}
.channel-section{margin-top:16px}
.channel-section:first-child{margin-top:4px}
.section-header{padding:2px 8px;display:flex;align-items:center;cursor:pointer;color:var(--text-muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;user-select:none}
.section-header:hover{color:var(--text-normal)}
.section-header .collapse{font-size:10px;margin-right:4px;transition:transform .15s}
.channel-item{padding:4px 8px;margin:1px 0;border-radius:4px;display:flex;align-items:center;cursor:pointer;color:var(--channel-default);font-size:15px;gap:6px;transition:none}
.channel-item:hover{background:var(--bg-hover);color:var(--channel-hover)}
.channel-item.active{background:var(--bg-active);color:var(--channel-active)}
.channel-item .channel-hash{font-size:18px;font-weight:300;color:var(--text-muted);width:20px;text-align:center;flex-shrink:0}
.channel-item.active .channel-hash{color:var(--text-normal)}
.channel-item .channel-lock{font-size:14px;color:var(--text-muted)}
.channel-item .channel-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-item .channel-badge{background:var(--red-400);color:#fff;font-size:11px;font-weight:600;padding:0 6px;border-radius:10px;min-width:16px;text-align:center;line-height:16px}
/* Main content */
.main-panel{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-primary)}
.main-header{height:var(--header-height);padding:0 16px;display:flex;align-items:center;border-bottom:1px solid var(--bg-tertiary);flex-shrink:0;gap:8px}
.main-header .channel-hash{font-size:22px;font-weight:300;color:var(--text-muted)}
.main-header .channel-title{font-weight:600;color:var(--header-primary);font-size:16px}
.main-header .channel-topic{color:var(--text-muted);font-size:13px;margin-left:8px;padding-left:8px;border-left:1px solid var(--bg-hover);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.main-header .connection-status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);flex-shrink:0}
.main-header .status-dot{width:8px;height:8px;border-radius:50%}
.main-content{flex:1;overflow-y:auto;padding:16px;position:relative}
/* Right panel - members */
.member-sidebar{width:var(--member-width);background:var(--bg-secondary);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;display:none}
.member-sidebar.visible{display:flex}
.member-header{height:var(--header-height);padding:0 16px;display:flex;align-items:center;border-bottom:1px solid var(--bg-tertiary);font-weight:600;color:var(--header-primary);font-size:14px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.member-scroll{padding:8px;overflow-y:auto;flex:1}
.member-group{margin-bottom:16px}
.member-group-header{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 8px 4px}
.member-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:4px;cursor:pointer}
.member-item:hover{background:var(--bg-hover)}
.member-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;position:relative}
.member-avatar .status-ring{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg-secondary)}
.member-info{flex:1;min-width:0}
.member-name{font-size:15px;font-weight:500;color:var(--text-normal);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-task{font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.member-status{flex-shrink:0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:8px}
.member-status.busy{background:var(--red-430);color:#fff}
.member-status.idle{color:var(--text-muted)}
.member-status.online{color:var(--status-online)}
/* Activity feed */
.activity-feed{display:flex;flex-direction:column;gap:2px}
.activity-message{display:flex;gap:12px;padding:4px 0;position:relative;min-height:48px}
.activity-message:hover{background:var(--bg-hover);border-radius:4px;margin:0 -12px;padding:4px 12px}
.activity-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;margin-top:2px}
.activity-body{flex:1;min-width:0}
.activity-header{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.activity-author{font-weight:500;font-size:15px;color:var(--header-primary)}
.activity-time{font-size:12px;color:var(--text-muted)}
.activity-detail{font-size:14px;color:var(--text-normal);margin-top:2px;word-wrap:break-word}
.activity-detail .event-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:12px;font-weight:600;margin:0 4px}
.event-badge.assigned{background:var(--brand-500);color:#fff}
.event-badge.created{background:var(--green-430);color:#fff}
.event-badge.status{background:var(--yellow-360);color:#fff}
.event-badge.busy{background:var(--red-430);color:#fff}
.event-badge.idle{background:var(--text-muted);color:#fff}
.event-badge.completed{background:var(--green-360);color:#fff}
.activity-status-line{font-size:13px;color:var(--text-muted);padding:4px 0}
.activity-status-line .from{color:var(--text-warning)}
.activity-status-line .to{color:var(--text-positive)}
.activity-status-line .arrow{color:var(--text-muted);margin:0 4px}
.activity-empty{padding:40px 20px;text-align:center;color:var(--text-muted)}
.activity-empty .empty-icon{font-size:48px;margin-bottom:16px}
.activity-empty .empty-title{font-size:20px;font-weight:600;color:var(--header-primary);margin-bottom:8px}
.activity-empty .empty-desc{font-size:14px;max-width:400px;margin:0 auto}
/* Loading & error */
.activity-loading,.kanban-loading,.approval-loading{padding:40px;text-align:center;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--bg-hover);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{padding:12px 16px;background:var(--red-430);color:#fff;border-radius:8px;margin:8px 0;font-size:14px}
/* Kanban */
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;min-height:300px}
.kanban-col{min-width:240px;max-width:280px;flex:1;background:var(--bg-secondary);border-radius:8px;display:flex;flex-direction:column}
.kanban-col-header{padding:12px 12px 8px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-shrink:0}
.kanban-col-count{background:var(--bg-hover);color:var(--text-muted);font-size:12px;padding:0 8px;border-radius:8px;line-height:20px}
.kanban-col-body{padding:4px 8px 8px;flex:1;overflow-y:auto}
.kanban-card{background:var(--bg-primary);border-radius:6px;padding:10px 12px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;transition:border-color .15s}
.kanban-card:hover{border-color:var(--bg-hover)}
.kanban-card-title{font-size:14px;font-weight:500;color:var(--text-normal);margin-bottom:4px}
.kanban-card-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
.kanban-card-priority{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kanban-card.assignee{display:flex;align-items:center;gap:4px}
.kanban-card .assignee-dot{width:6px;height:6px;border-radius:50%;background:var(--brand)}
/* Approvals */
.approval-list{display:flex;flex-direction:column;gap:8px}
.approval-card{background:var(--bg-secondary);border-radius:8px;padding:16px;border-left:4px solid var(--yellow-300)}
.approval-card.approved{border-left-color:var(--green-360)}
.approval-card.rejected{border-left-color:var(--red-400)}
.approval-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.approval-title{font-size:15px;font-weight:600;color:var(--header-primary)}
.approval-status{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:8px}
.approval-status.pending{background:var(--yellow-360);color:#fff}
.approval-status.approved{background:var(--green-360);color:#fff}
.approval-status.rejected{background:var(--red-400);color:#fff}
.approval-body{font-size:14px;color:var(--text-normal);margin-bottom:12px}
.approval-actions{display:flex;gap:8px}
.approval-actions button{padding:6px 16px;border:none;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer}
.btn-approve{background:var(--green-360);color:#fff}
.btn-approve:hover{background:var(--green-430)}
.btn-reject{background:var(--red-400);color:#fff}
.btn-reject:hover{background:var(--red-430)}
/* Health */
.health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.health-card{background:var(--bg-secondary);border-radius:8px;padding:16px}
.health-card h3{font-size:14px;font-weight:600;color:var(--header-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.health-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg-hover);font-size:14px}
.health-stat:last-child{border-bottom:none}
.health-stat .label{color:var(--text-muted)}
.health-stat .value{color:var(--text-normal);font-weight:500}
.health-stat .value.ok{color:var(--text-positive)}
.health-stat .value.degraded{color:var(--text-warning)}
.health-stat .value.error{color:var(--text-danger)}
/* Tooltips */
.tooltip{position:relative}
.tooltip::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg-tertiary);color:var(--text-normal);font-size:12px;padding:4px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.tooltip:hover::after{opacity:1}
/* Scrollbar */
.channel-scroll::-webkit-scrollbar,.main-content::-webkit-scrollbar,.member-scroll::-webkit-scrollbar{width:var(--scrollbar-thin)}
.channel-scroll::-webkit-scrollbar-track,.main-content::-webkit-scrollbar-track,.member-scroll::-webkit-scrollbar-track{background:transparent}
.channel-scroll::-webkit-scrollbar-thumb,.main-content::-webkit-scrollbar-thumb,.member-scroll::-webkit-scrollbar-thumb{background:var(--bg-tertiary);border-radius:2px}
/* Message input bar */
.message-bar{display:none;padding:0 16px 16px;flex-shrink:0}
.message-bar.visible{display:block}
.message-input-wrapper{background:var(--bg-secondary);border-radius:8px;padding:8px 12px;border:1px solid var(--bg-tertiary);display:flex;align-items:center;gap:8px}
.message-input-wrapper:focus-within{border-color:var(--brand)}
.message-input{flex:1;background:transparent;border:none;outline:none;color:var(--text-normal);font-size:15px;font-family:var(--font-primary)}
.message-input::placeholder{color:var(--text-muted)}
/* Responsive */
@media(max-width:1024px){.member-sidebar{display:none!important}}
@media(max-width:768px){.guild-sidebar{width:48px}.guild-icon{width:36px;height:36px;font-size:16px}.channel-sidebar{width:180px}}
/* Agent avatar colors */
.avatar-ceo{background:#5865f2}
.avatar-planner{background:#9b59b6}
.avatar-eng-a{background:#3498db}
.avatar-eng-b{background:#1abc9c}
.avatar-dbg{background:#e67e22}
.avatar-qa{background:#2ecc71}
.avatar-sec{background:#e74c3c}
.avatar-rev{background:#95a5a6}
.avatar-user{background:#5865f2}
.avatar-assigner{background:#f1c40f}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.activity-message{animation:fadeIn .2s ease-out}
/* Task creation modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease-out}
.modal-box{background:var(--bg-primary);border-radius:12px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.4)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--bg-tertiary)}
.modal-header h2{font-size:18px;font-weight:600;color:var(--header-primary)}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:var(--text-normal)}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-field{display:flex;flex-direction:column;gap:6px}
.modal-field label{font-size:13px;font-weight:600;color:var(--header-secondary);text-transform:uppercase;letter-spacing:.5px}
.modal-field input,.modal-field textarea,.modal-field select{background:var(--bg-secondary);border:1px solid var(--bg-hover);border-radius:6px;padding:10px 12px;color:var(--text-normal);font-size:14px;font-family:var(--font-primary);outline:none;transition:border-color .15s}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--brand)}
.modal-field textarea{resize:vertical;min-height:80px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--bg-tertiary)}
.modal-btn{padding:8px 20px;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.modal-btn:hover{opacity:.85}
.modal-btn-primary{background:var(--brand);color:#fff}
.modal-btn-cancel{background:var(--bg-hover);color:var(--text-normal)}
</style>
</head>
<body>
<div class="app-layout">
  <!-- Guild sidebar -->
  <div class="guild-sidebar">
    <div class="guild-icon active tooltip" data-tooltip="AI Team">🤖</div>
    <div class="guild-divider"></div>
  </div>

  <!-- Channel sidebar -->
  <div class="channel-sidebar">
    <div class="channel-header" style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:4px">
        <span class="header-arrow" style="font-size:10px">▼</span>
        <span>AI Team Operations</span>
      </div>
      <button id="create-task-btn" onclick="openTaskModal()" style="width:28px;height:28px;border:none;border-radius:6px;background:var(--bg-hover);color:var(--text-muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1" title="Create new task">+</button>
    </div>
    <div class="channel-scroll">
      <div class="channel-section">
        <div class="section-header">
          <span class="collapse">▼</span>
          Channels
        </div>
        <div class="channel-item active" data-channel="activity" id="ch-activity">
          <span class="channel-hash">#</span>
          <span class="channel-name">agent-activity</span>
        </div>
        <div class="channel-item" data-channel="kanban" id="ch-kanban">
          <span class="channel-hash">#</span>
          <span class="channel-name">task-board</span>
        </div>
        <div class="channel-item" data-channel="approvals" id="ch-approvals">
          <span class="channel-hash">#</span>
          <span class="channel-name">approvals</span>
          <span class="channel-badge" id="approval-count" style="display:none">0</span>
        </div>
        <div class="channel-item" data-channel="health" id="ch-health">
          <span class="channel-hash">#</span>
          <span class="channel-name">system-health</span>
        </div>
      </div>
      <div class="channel-section">
        <div class="section-header">
          <span class="collapse">▼</span>
          Agents
        </div>
        <div id="agent-list-channels"></div>
      </div>
    </div>
  </div>

  <!-- Main panel -->
  <div class="main-panel">
    <div class="main-header">
      <span class="channel-hash">#</span>
      <span class="channel-title" id="channel-title">agent-activity</span>
      <span class="channel-topic" id="channel-topic">Real-time agent interaction feed</span>
      <div class="connection-status">
        <span class="status-dot" id="conn-dot" style="background:var(--text-muted)"></span>
        <span id="conn-text">connecting</span>
      </div>
    </div>
    <div class="main-content" id="main-content">
      <!-- Content rendered by JS -->
    </div>
  </div>

  <!-- Member sidebar -->
  <div class="member-sidebar visible" id="member-sidebar">
    <div class="member-header">Agent Roster — <span id="agent-count">0</span></div>
    <div class="member-scroll" id="member-scroll">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<!-- Task creation modal (hidden by default) -->
<div id="task-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeTaskModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>📋 Create Task</h2>
      <button class="modal-close" onclick="closeTaskModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label>Title *</label>
        <input type="text" id="task-title" placeholder="What needs to be done?" autofocus>
      </div>
      <div class="modal-field">
        <label>Description</label>
        <textarea id="task-desc" placeholder="Describe the task in detail..."></textarea>
      </div>
      <div class="modal-field">
        <label>Priority</label>
        <select id="task-priority">
          <option value="1">🔴 Critical (P1)</option>
          <option value="2" selected>🟡 High (P2)</option>
          <option value="3">🟢 Medium (P3)</option>
          <option value="4">⚪ Low (P4)</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Task Type</label>
        <select id="task-type">
          <option value="coding">💻 Coding</option>
          <option value="planning">📐 Planning</option>
          <option value="research">📚 Research</option>
          <option value="development">🔧 Development</option>
          <option value="qa">🧪 QA / Testing</option>
          <option value="security">🛡️ Security</option>
          <option value="debugging">🔍 Debugging</option>
          <option value="refactoring">♻️ Refactoring</option>
          <option value="final_review">✅ Final Review</option>
        </select>
      </div>
      <div id="task-modal-error" style="color:var(--text-danger);font-size:13px;display:none">Title is required.</div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="modal-btn modal-btn-primary" onclick="submitTask()">Create Task</button>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────
const STATE = {
  activeChannel: 'activity',

};

function ago(ts) {
  const sec = Math.floor((Date.now() - ts * 1000) / 1000);
  if (sec < 10) return 'just now';
  if (sec < 60) return `${sec}s ago`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const d = Math.floor(hr / 24);
  return `${d}d ago`;
}

function timeStr(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

// ── API ──────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path, { headers:{'Accept':'application/json'} });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ── Render Activity ──────────────────────────────────────────────────
function renderActivity(events) {
  const el = document.getElementById('main-content');
  if (!events || events.length === 0) {
    el.innerHTML = `
      <div class="activity-empty">
        <div class="empty-icon">🤖</div>
        <div class="empty-title">Welcome to #agent-activity</div>
        <div class="empty-desc">
          This is the start of the agent activity feed. As tasks are created,
          assigned, and completed, you'll see every agent interaction here in real-time.
        </div>
      </div>`;
    return;
  }

  let html = '<div class="activity-feed">';
  for (const e of events) {
    const icon = EVENT_ICONS[e.kind] || '📌';
    const author = AGENT_NAMES[e.actor] || e.actor;
    const color = AGENT_COLORS[e.actor] || '#5865f2';
    const initial = author.charAt(0).toUpperCase();

    html += `<div class="activity-message">
      <div class="activity-avatar" style="background:${color};cursor:pointer" onclick="selectAgent('${e.actor}')">${initial}</div>
      <div class="activity-body">
        <div class="activity-header">
          <span class="activity-author" style="color:${color};cursor:pointer" onclick="selectAgent('${e.actor}')">${author}</span>
          <span class="activity-time">${ago(e.timestamp)}</span>
        </div>`;

    if (e.kind === 'task_created') {
      html += `<div class="activity-detail"><span class="event-badge created">NEW</span> <strong>${e.task_title}</strong> — ${e.detail}</div>`;
    } else if (e.kind === 'task_assigned') {
      html += `<div class="activity-detail"><span class="event-badge assigned">ASSIGN</span> <strong>${e.task_title}</strong> → ${e.detail}</div>`;
    } else if (e.kind === 'task_status') {
      html += `<div class="activity-detail"><span class="event-badge status">STATUS</span> <strong>${e.task_title}</strong>
        <span class="activity-status-line">
          <span class="from">${e.from_status || '?'}</span>
          <span class="arrow">➜</span>
          <span class="to">${e.to_status || '?'}</span>
        </span>
      </div>`;
    } else if (e.kind === 'agent_busy') {
      html += `<div class="activity-detail"><span class="event-badge busy">BUSY</span> ${e.detail}</div>`;
    } else if (e.kind === 'agent_idle') {
      html += `<div class="activity-detail"><span class="event-badge idle">IDLE</span> ${e.detail}</div>`;
    } else {
      html += `<div class="activity-detail">${e.detail || e.kind}</div>`;
    }

    html += `<div class="activity-time" style="margin-top:4px">${timeStr(e.timestamp)}</div>`;
    html += `</div></div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── Render Kanban ────────────────────────────────────────────────────
const STATUS_ORDER = ['backlog','ready','planning','in_progress','review','qa','security','approval','release','done','cancelled'];
const STATUS_LABELS = { backlog:'Backlog', ready:'Ready', planning:'Planning', in_progress:'In Progress',
  review:'Review', qa:'QA', security:'Security', approval:'Approval', release:'Release', done:'Done', cancelled:'Cancelled' };
const PRIORITY_COLORS = { 1:'#f23f42', 2:'#f0b232', 3:'#23a55a', 4:'#949ba4', 5:'#949ba4' };

function renderKanban(tasks) {
  const cols = {};
  for (const s of STATUS_ORDER) cols[s] = [];

  for (const t of tasks || []) {
    const status = t.status?.value || t.status || 'backlog';
    if (cols[status]) cols[status].push(t);
  }

  let html = '<div class="kanban-board">';
  for (const s of STATUS_ORDER) {
    if (s === 'cancelled') continue;
    const items = cols[s];
    html += `<div class="kanban-col">
      <div class="kanban-col-header">
        ${STATUS_LABELS[s] || s}
        <span class="kanban-col-count">${items.length}</span>
      </div>
      <div class="kanban-col-body">`;
    for (const t of items) {
      const pri = t.priority || 3;
      html += `<div class="kanban-card">
        <div class="kanban-card-title">${t.title || 'Untitled'}</div>
        <div class="kanban-card-meta">
          <span class="kanban-card-priority" style="background:${PRIORITY_COLORS[pri] || '#949ba4'}"></span>
          ${t.assignee ? `<span class="assignee"><span class="assignee-dot"></span>${t.assignee}</span>` : ''}
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

// ── Render Approvals ─────────────────────────────────────────────────
function renderApprovals(approvals) {
  const el = document.getElementById('main-content');
  if (!approvals || approvals.length === 0) {
    el.innerHTML = '<div class="activity-empty"><div class="empty-icon">✅</div><div class="empty-title">No approvals pending</div><div class="empty-desc">All clear — no work items are waiting for approval.</div></div>';
    return;
  }
  let html = '<div class="approval-list">';
  for (const a of approvals) {
    const st = a.status || 'pending';
    html += `<div class="approval-card ${st}">
      <div class="approval-header">
        <span class="approval-title">${a.summary || a.id}</span>
        <span class="approval-status ${st}">${st}</span>
      </div>
      <div class="approval-body">${a.qa_report || a.security_report || 'Awaiting reports...'}</div>
      <div class="approval-actions">
        ${st === 'pending' ? `<button class="btn-approve" data-id="${a.id}">Approve</button><button class="btn-reject" data-id="${a.id}">Reject</button>` : ''}
      </div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── Agent selection ──────────────────────────────────────────────────
function selectAgent(agentId) {
  STATE.selectedAgent = agentId;
  STATE.activeChannel = `agent-${agentId}`;
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const chEl = document.getElementById(`ch-${agentId}`);
  if (chEl) chEl.classList.add('active');
  document.getElementById('channel-title').textContent = AGENT_NAMES[agentId] || agentId;
  document.getElementById('channel-topic').textContent = AGENT_ROLES[agentId] || '';
  document.getElementById('member-sidebar').classList.add('visible');
  renderAgentDetail(agentId);
}

          </div>`;

  // Scroll to top

function setFilter(filter) {
  STATE.activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.style.background = b.dataset.filter === filter ? 'var(--brand)' : 'var(--bg-hover)';
    b.style.color = b.dataset.filter === filter ? '#fff' : 'var(--text-muted)';
  });
}

// ── Channel switching ────────────────────────────────────────────────
function switchChannel(channel) {
  STATE.selectedAgent = null;
  STATE.activeChannel = channel;
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const chEl = document.getElementById(`ch-${channel}`);
  if (chEl) chEl.classList.add('active');

  const titles = { activity:'agent-activity', kanban:'task-board', approvals:'approvals', health:'system-health' };
  const topics = { activity:'Real-time agent interaction feed', kanban:'Visual task board', approvals:'Pending approvals', health:'System health monitoring' };
  document.getElementById('channel-title').textContent = titles[channel] || channel;
  document.getElementById('channel-topic').textContent = topics[channel] || '';
  document.getElementById('member-sidebar').classList.toggle('visible', channel === 'activity');

  render();
}

function render() {
  switch (STATE.activeChannel) {
    case 'activity': renderActivity(STATE.activity); break;
    case 'kanban': renderKanban(STATE.tasks); break;
    case 'approvals': renderApprovals(STATE.approvals); break;
    case 'health': renderHealth(STATE.health); break;
  }
}

// ── Data fetching ────────────────────────────────────────────────────
async function fetchActivity() {
  try {
    const data = await api('/v1/activity?limit=50');
    STATE.activity = data.events || [];
    if (STATE.activeChannel === 'activity') renderActivity(STATE.activity);
    else if (STATE.selectedAgent) renderAgentDetail(STATE.selectedAgent);
  } catch (e) { console.error('activity fetch error', e); }
}

async function fetchAgents() {
  try {
    const data = await api('/v1/agents');
    const agentList = Array.isArray(data) ? data : (data.agents || []);
    STATE.agents = agentList.map(a => ({
      ...a,
      status: a.status || (a.current_task_id ? 'busy' : 'idle'),
    }));
    renderMembers();
    renderAgentChannels();
    if (STATE.selectedAgent) renderAgentDetail(STATE.selectedAgent);
  } catch (e) { console.error('agents fetch error', e); }
}

async function fetchTasks() {
  try {
    STATE.tasks = await api('/v1/tasks');
    if (STATE.activeChannel === 'kanban') renderKanban(STATE.tasks);
    else if (STATE.selectedAgent) renderAgentDetail(STATE.selectedAgent);
  } catch (e) { console.error('tasks fetch error', e); }
}

async function fetchApprovals() {
  try {
    const data = await api('/v1/approvals?status=pending');
    STATE.approvals = Array.isArray(data) ? data : (data.approvals || []);
    const count = STATE.approvals.length;
    const badge = document.getElementById('approval-count');
    if (count > 0) { badge.textContent = count; badge.style.display = ''; }
    else badge.style.display = 'none';
    if (STATE.activeChannel === 'approvals') renderApprovals(STATE.approvals);
  } catch (e) { console.error('approvals fetch error', e); }
}

async function fetchHealth() {
  try {
    const data = await api('/v1/health');
    STATE.health = data;
    if (STATE.activeChannel === 'health') renderHealth(data);
  } catch (e) { console.error('health fetch error', e); }
}

async function fetchAll() {
  await Promise.all([fetchActivity(), fetchAgents(), fetchTasks(), fetchApprovals(), fetchHealth()]);
}

function renderAgentChannels() {
  const el = document.getElementById('agent-list-channels');
  el.innerHTML = STATE.agents.map(a => {
    const color = AGENT_COLORS[a.id] || '#5865f2';
    const name = AGENT_NAMES[a.id] || a.name || a.id;
    const busy = a.status === 'busy';
    return `<div class="channel-item" style="padding-left:16px" data-agent-id="${a.id}" onclick="selectAgent('${a.id}')" title="Click to view ${name} details">
      <span style="width:8px;height:8px;border-radius:50%;background:${busy ? 'var(--status-online)' : 'var(--status-idle)'};flex-shrink:0"></span>
      <span class="channel-name">${name}</span>
      ${busy ? '<span style="font-size:11px;color:var(--text-muted)">working</span>' : ''}
    </div>`;
  }).join('');
}

// ── Polling ──────────────────────────────────────────────────────────
function startPolling() {
  fetchAll();
  STATE.pollActivity = setInterval(fetchActivity, 3000);
  STATE.pollAgents = setInterval(fetchAgents, 5000);
  STATE.pollTasks = setInterval(fetchTasks, 5000);
  STATE.pollApprovals = setInterval(fetchApprovals, 8000);
  STATE.pollHealth = setInterval(fetchHealth, 15000);
}

// ── Task creation modal ──────────────────────────────────────────────
async function openTaskModal() {
  document.getElementById('task-modal').style.display = 'flex';
  document.getElementById('task-title').focus();
  document.getElementById('task-modal-error').style.display = 'none';
}

function closeTaskModal() {
  document.getElementById('task-modal').style.display = 'none';
}

async function submitTask() {
  const title = document.getElementById('task-title').value.trim();
  const desc = document.getElementById('task-desc').value.trim();
  const priority = parseInt(document.getElementById('task-priority').value);
  const taskType = document.getElementById('task-type').value;

  if (!title) {
    document.getElementById('task-modal-error').style.display = 'block';
    document.getElementById('task-title').focus();
    return;
  }
  document.getElementById('task-modal-error').style.display = 'none';

  const modalBtn = document.querySelector('#task-modal .modal-btn-primary');
  modalBtn.disabled = true;
  modalBtn.textContent = 'Creating...';

  try {
    const body = { title, description: desc, priority };
    const res = await fetch('/v1/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const task = await res.json();
    closeTaskModal();
    document.getElementById('task-title').value = '';
    document.getElementById('task-desc').value = '';
    // Refresh tasks and activity
    fetchTasks();
    fetchActivity();
    // Show a brief success notification
    const topic = document.getElementById('channel-topic');
    const orig = topic.textContent;
    topic.textContent = `✅ Task "${title}" created!`;
    setTimeout(() => { topic.textContent = orig; }, 3000);
  } catch (err) {
    document.getElementById('task-modal-error').textContent = `Failed: ${err.message}`;
    document.getElementById('task-modal-error').style.display = 'block';
  } finally {
    modalBtn.disabled = false;
    modalBtn.textContent = 'Create Task';
  }
}

// ── Connection indicator ─────────────────────────────────────────────
async function updateConnection() {
  const dot = document.getElementById('conn-dot');
  const text = document.getElementById('conn-text');
  try {
    await api('/v1/health');
    dot.style.background = 'var(--status-online)';
    text.textContent = 'connected';
  } catch {
    dot.style.background = 'var(--status-dnd)';
    text.textContent = 'disconnected';
  }
}

// ── Init ─────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Channel switching
  document.querySelectorAll('.channel-item[data-channel]').forEach(el => {
    el.addEventListener('click', () => switchChannel(el.dataset.channel));
  });

  // Approval actions (delegated)
  document.getElementById('main-content').addEventListener('click', async (e) => {
    if (e.target.classList.contains('btn-approve')) {
      const id = e.target.dataset.id;
      try {
        await fetch(`/dashboard/approvals/${id}/approve`, { method:'POST' });
        await fetchApprovals();
      } catch (err) { console.error('approve failed', err); }
    }
    if (e.target.classList.contains('btn-reject')) {
      const id = e.target.dataset.id;
      try {
        await fetch(`/dashboard/approvals/${id}/reject`, { method:'POST' });
        await fetchApprovals();
      } catch (err) { console.error('reject failed', err); }
    }
  });

  updateConnection();
  startPolling();
  setInterval(updateConnection, 30000);

  // Keyboard shortcuts for task modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeTaskModal();
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey) && document.getElementById('task-modal').style.display === 'flex') {
      submitTask();
    }
  });
});
</script>
