<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Team Dashboard</title>
<meta name="description" content="AI Team - Orchestrated Development"/>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background: #0d0d1a;
  color: #e0e0f0;
  min-height: 100vh;
  padding: 1.5rem;
}

/* ── Layout ── */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid #2a2a4a;
}
.app-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-actions { display: flex; gap: 0.75rem; align-items: center; }
.health-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 600;
}
.health-badge.ok { background: #065f4620; color: #6ee7b7; border: 1px solid #065f46; }
.health-badge.degraded { background: #78350f20; color: #fcd34d; border: 1px solid #78350f; }
.health-badge.unknown { background: #1f293720; color: #9ca3af; border: 1px solid #374151; }

/* ── Mode Selector ── */
.mode-bar {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  padding: 0.5rem;
  background: #1a1a2e;
  border-radius: 10px;
  border: 1px solid #2a2a4a;
}
.mode-pill {
  flex: 1;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: #6b7280;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.mode-pill:hover { color: #d1d5db; background: #252540; }
.mode-pill.active {
  background: #4f46e5;
  color: #fff;
  border-color: #6366f1;
  box-shadow: 0 0 12px #4f46e540;
}
.mode-pill .mode-short { font-size: 0.65rem; opacity: 0.6; display: block; margin-top: 2px; }

/* ── Stats Row ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 1rem;
  text-align: center;
}
.stat-card .stat-value { font-size: 1.75rem; font-weight: 700; }
.stat-card .stat-label { font-size: 0.7rem; color: #6b7280; margin-top: 0.25rem; }
.stat-card.purple .stat-value { color: #a78bfa; }
.stat-card.blue .stat-value { color: #60a5fa; }
.stat-card.green .stat-value { color: #6ee7b7; }
.stat-card.yellow .stat-value { color: #fcd34d; }

/* ── Kanban Board ── */
.kanban-section { margin-bottom: 1.5rem; }
.kanban-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; color: #d1d5db; }
.kanban-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.75rem;
}
.kanban-col {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 10px;
  padding: 0.75rem;
  min-height: 120px;
}
.kanban-col h3 {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.5rem;
  padding-bottom: 0.4rem;
  border-bottom: 2px solid #2a2a4a;
  display: flex;
  justify-content: space-between;
}
.kanban-col h3 .count {
  font-size: 0.65rem;
  background: #2a2a4a;
  padding: 0.1rem 0.5rem;
  border-radius: 999px;
  color: #9ca3af;
}
.task-card {
  background: #252540;
  border: 1px solid #374151;
  border-radius: 8px;
  padding: 0.6rem;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.task-card:hover { border-color: #6366f1; box-shadow: 0 0 8px #4f46e520; }
.task-card .task-title { font-size: 0.8rem; font-weight: 500; margin-bottom: 0.3rem; }
.task-card .task-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; font-size: 0.65rem; }
.task-priority {
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
  font-weight: 600;
}
.task-priority.p1 { background: #7f1d1d; color: #fca5a5; }
.task-priority.p2 { background: #78350f; color: #fcd34d; }
.task-priority.p3 { background: #1e3a5f; color: #93c5fd; }
.task-assignee {
  background: #374151;
  padding: 0.1rem 0.4rem;
  border-radius: 4px;
  color: #9ca3af;
}
.kanban-col-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60px;
  color: #4b5563;
  font-size: 0.75rem;
  font-style: italic;
}

/* ── Agents ── */
.agents-section { margin-bottom: 1.5rem; }
.agents-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }
.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.5rem;
}
.agent-card {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 8px;
  padding: 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.agent-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.agent-dot.idle { background: #6ee7b7; box-shadow: 0 0 6px #6ee7b780; }
.agent-dot.busy { background: #fcd34d; box-shadow: 0 0 6px #fcd34d80; }
.agent-dot.error { background: #fca5a5; box-shadow: 0 0 6px #fca5a580; }
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-size: 0.75rem; font-weight: 600; }
.agent-task { font-size: 0.6rem; color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Quick Create ── */
.quick-create {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}
.quick-create input {
  flex: 1;
  padding: 0.6rem 1rem;
  border-radius: 8px;
  border: 1px solid #2a2a4a;
  background: #1a1a2e;
  color: #e0e0f0;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.quick-create input:focus { border-color: #6366f1; box-shadow: 0 0 8px #4f46e520; }
.quick-create input::placeholder { color: #4b5563; }
.quick-create select {
  padding: 0.6rem;
  border-radius: 8px;
  border: 1px solid #2a2a4a;
  background: #1a1a2e;
  color: #e0e0f0;
  font-size: 0.85rem;
  outline: none;
}
.btn {
  padding: 0.6rem 1.2rem;
  border-radius: 8px;
  border: none;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary { background: #4f46e5; color: #fff; }
.btn-primary:hover { background: #6366f1; box-shadow: 0 0 12px #4f46e540; }
.btn-secondary { background: #374151; color: #d1d5db; }
.btn-secondary:hover { background: #4b5563; }
.btn-sm { padding: 0.4rem 0.8rem; font-size: 0.75rem; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: #1a1a2e;
  border: 1px solid #2a2a4a;
  border-radius: 16px;
  padding: 1.5rem;
  max-width: 520px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
.modal .field { margin-bottom: 0.75rem; }
.modal .field label { display: block; font-size: 0.75rem; color: #6b7280; margin-bottom: 0.25rem; }
.modal .field input, .modal .field select { width: 100%; padding: 0.5rem; border-radius: 6px; border: 1px solid #2a2a4a; background: #252540; color: #e0e0f0; font-size: 0.85rem; }
.modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end; }

/* ── Activity Feed ── */
.activity-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem; }
.activity-list { list-style: none; }
.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.4rem 0;
  border-bottom: 1px solid #1f2937;
  font-size: 0.8rem;
}
.activity-item:last-child { border-bottom: none; }
.activity-time { font-size: 0.65rem; color: #4b5563; white-space: nowrap; margin-top: 2px; }
.activity-msg { flex: 1; }
.activity-msg strong { color: #d1d5db; }
.activity-msg em { color: #6ee7b7; font-style: normal; }

/* ── Toast ── */
.toast-container {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast {
  padding: 0.75rem 1.25rem;
  border-radius: 8px;
  color: #fff;
  font-size: 0.85rem;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  animation: slideIn 0.2s ease;
  min-width: 200px;
}
.toast.success { background: #065f46; }
.toast.error { background: #7f1d1d; }
.toast.info { background: #1e3a5f; }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

/* ── Loading ── */
.loading { text-align: center; padding: 2rem; color: #4b5563; font-size: 0.85rem; }
.spinner {
  display: inline-block;
  width: 24px; height: 24px;
  border: 3px solid #2a2a4a;
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ── */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .kanban-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  body { padding: 1rem; }
  .stats-row { grid-template-columns: 1fr; }
  .kanban-grid { grid-template-columns: 1fr; }
  .quick-create { flex-direction: column; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <h1>AI Team Dashboard</h1>
  <div class="header-actions">
    <span class="health-badge unknown" id="health-badge">● checking…</span>
    <button class="btn btn-secondary btn-sm" onclick="fetchDashboard()">↻</button>
  </div>
</header>

<!-- Mode Selector -->
<div class="mode-bar" id="mode-bar">
  <button class="mode-pill active" data-mode="ask" onclick="setMode('ask')">💬 Ask<span class="mode-short">Q&A</span></button>
  <button class="mode-pill" data-mode="plan" onclick="setMode('plan')">📋 Plan<span class="mode-short">Architect</span></button>
  <button class="mode-pill" data-mode="code" onclick="setMode('code')">⚡ Code<span class="mode-short">Execute</span></button>
  <button class="mode-pill" data-mode="auto" onclick="setMode('auto')">🤖 Auto<span class="mode-short">Classify</span></button>
</div>

<!-- Stats -->
<div class="stats-row" id="stats-row">
  <div class="stat-card purple"><div class="stat-value" id="stat-goals">-</div><div class="stat-label">Goals</div></div>
  <div class="stat-card blue"><div class="stat-value" id="stat-tasks">-</div><div class="stat-label">Active Tasks</div></div>
  <div class="stat-card green"><div class="stat-value" id="stat-agents">-</div><div class="stat-label">Agents</div></div>
  <div class="stat-card yellow"><div class="stat-value" id="stat-pending">-</div><div class="stat-label">Pending</div></div>
</div>

<!-- Quick Create -->
<div class="quick-create">
  <input type="text" id="new-task-title" placeholder="New task title…" onkeydown="if(event.key==='Enter') createTask()"/>
  <select id="new-task-priority">
    <option value="1">P1</option>
    <option value="2" selected>P2</option>
    <option value="3">P3</option>
  </select>
  <button class="btn btn-primary" onclick="createTask()">+ Add</button>
</div>

<!-- Kanban Board -->
<div class="kanban-section">
  <h2>Task Board</h2>
  <div class="kanban-grid" id="kanban-grid">
    <div class="kanban-col" data-col="backlog"><h3>Backlog <span class="count" id="count-backlog">0</span></h3><div id="col-backlog"></div></div>
    <div class="kanban-col" data-col="planning"><h3>Planning <span class="count" id="count-planning">0</span></h3><div id="col-planning"></div></div>
    <div class="kanban-col" data-col="in_progress"><h3>In Progress <span class="count" id="count-in_progress">0</span></h3><div id="col-in_progress"></div></div>
    <div class="kanban-col" data-col="done"><h3>Done <span class="count" id="count-done">0</span></h3><div id="col-done"></div></div>
  </div>
</div>

<!-- Agents -->
<div class="agents-section">
  <h2>Agents</h2>
  <div class="agents-grid" id="agents-grid"></div>
</div>

<!-- Activity -->
<div class="activity-section">
  <h2>Recent Activity</h2>
  <ul class="activity-list" id="activity-list">
    <li class="loading">Loading…</li>
  </ul>
</div>

<!-- Task Detail Modal -->
<div class="modal-overlay" id="task-modal">
  <div class="modal" id="task-modal-content">
    <h2 id="modal-title">Task</h2>
    <div class="field"><label>Description</label><p id="modal-desc" style="font-size:0.85rem;color:#9ca3af;"></p></div>
    <div class="field"><label>Status</label><span id="modal-status" style="background:#374151;padding:0.2rem 0.6rem;border-radius:4px;font-size:0.8rem;"></span></div>
    <div class="field"><label>Assignee</label>
      <select id="modal-assignee"><option value="">— unassigned —</option></select>
    </div>
    <div class="field"><label>Move to</label>
      <select id="modal-status-select">
        <option value="backlog">Backlog</option>
        <option value="ready">Ready</option>
        <option value="planning">Planning</option>
        <option value="in_progress">In Progress</option>
        <option value="review">Review</option>
        <option value="qa">QA</option>
        <option value="security">Security</option>
        <option value="approval">Approval</option>
        <option value="done">Done</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── State ──
let DASHBOARD_STATE = { tasks: [], agents: [], goals: 0, approvals: 0 };
let MODAL_TASK_ID = null;
let REFRESH_INTERVAL = null;

// ── API ──
async function api(path, options = {}) {
  const url = path.startsWith('http') ? path : path;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...options.headers },
    ...options,
  });
  if (!res.ok) throw new Error(`API ${res.status}: ${res.statusText}`);
  return res.json();
}

// ── Toast ──
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── Mode ──
function setMode(mode) {
  localStorage.setItem('ai-team-mode', mode);
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.toggle('active', p.dataset.mode === mode));
}
function loadMode() {
  const saved = localStorage.getItem('ai-team-mode') || 'ask';
  setMode(saved);
}

// ── Fetch Dashboard Data ──
async function fetchDashboard() {
  try {
    const [tasks, agents, health] = await Promise.all([
      api('/v1/tasks').catch(() => []),
      api('/v1/agents').catch(() => []),
      api('/v1/health').catch(() => null),
    ]);

    DASHBOARD_STATE.tasks = Array.isArray(tasks) ? tasks : [];
    DASHBOARD_STATE.agents = Array.isArray(agents) ? agents : [];
    renderStats();
    renderKanban();
    renderAgents();
    renderActivity();

    // Health badge
    const badge = document.getElementById('health-badge');
    if (health && health.status === 'ok') {
      badge.className = 'health-badge ok';
      badge.innerHTML = '● Healthy';
    } else if (health) {
      badge.className = 'health-badge degraded';
      badge.innerHTML = '● Degraded';
    } else {
      badge.className = 'health-badge unknown';
      badge.innerHTML = '● Offline';
    }
  } catch (e) {
    console.error('Dashboard fetch error:', e);
    toast('Failed to load dashboard data', 'error');
  }
}

// ── Render Stats ──
function renderStats() {
  const tasks = DASHBOARD_STATE.tasks;
  const active = tasks.filter(t => !['done','cancelled'].includes(t.status));
  const pending = tasks.filter(t => ['backlog','ready'].includes(t.status));
  document.getElementById('stat-goals').textContent = DASHBOARD_STATE.goals || '-';
  document.getElementById('stat-tasks').textContent = active.length;
  document.getElementById('stat-agents').textContent = DASHBOARD_STATE.agents.length;
  document.getElementById('stat-pending').textContent = pending.length;
}

// ── Render Kanban ──
function renderKanban() {
  const cols = ['backlog', 'planning', 'in_progress', 'done'];
  const displayNames = { backlog: 'Backlog', planning: 'Planning', in_progress: 'In Progress', done: 'Done' };

  // Count tasks in additional statuses too for "in progress"
  const allStatuses = {};
  DASHBOARD_STATE.tasks.forEach(t => {
    const s = t.status || 'backlog';
    allStatuses[s] = (allStatuses[s] || 0) + 1;
  });

  cols.forEach(col => {
    const container = document.getElementById(`col-${col}`);
    const countEl = document.getElementById(`count-${col}`);
    const colTasks = DASHBOARD_STATE.tasks.filter(t => {
      if (col === 'in_progress') return ['in_progress','review','qa','security','approval','ready'].includes(t.status);
      if (col === 'done') return ['done','cancelled'].includes(t.status);
      return t.status === col;
    });
    countEl.textContent = colTasks.length;

    if (colTasks.length === 0) {
      container.innerHTML = '<div class="kanban-col-empty">No tasks</div>';
      return;
    }

    container.innerHTML = colTasks.map(t => {
      const p = t.priority || 2;
      return `<div class="task-card" onclick="openTaskModal('${t.id}')">
        <div class="task-title">${escapeHtml(t.title)}</div>
        <div class="task-meta">
          <span class="task-priority p${p}">P${p}</span>
          ${t.assignee ? `<span class="task-assignee">${escapeHtml(t.assignee)}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  });
}

// ── Render Agents ──
function renderAgents() {
  const grid = document.getElementById('agents-grid');
  if (DASHBOARD_STATE.agents.length === 0) {
    grid.innerHTML = '<div class="loading">No agents registered</div>';
    return;
  }
  grid.innerHTML = DASHBOARD_STATE.agents.map(a => {
    const dotClass = a.status === 'busy' ? 'busy' : a.status === 'error' ? 'error' : 'idle';
    const taskInfo = a.current_task_id ? ` — ${a.current_task_id.slice(0,8)}` : '';
    return `<div class="agent-card">
      <span class="agent-dot ${dotClass}"></span>
      <div class="agent-info">
        <div class="agent-name">${escapeHtml(a.name || a.id)}</div>
        <div class="agent-task">${a.status}${taskInfo}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Render Activity ──
function renderActivity() {
  const list = document.getElementById('activity-list');
  const items = DASHBOARD_STATE.tasks.slice(-10).reverse();
  if (items.length === 0) {
    list.innerHTML = '<li class="loading" style="padding:0.5rem 0;">No activity yet</li>';
    return;
  }
  list.innerHTML = items.map(t => {
    const ago = timeAgo(t.updated_at);
    return `<li class="activity-item">
      <span class="activity-time">${ago}</span>
      <span class="activity-msg">Task <strong>${escapeHtml(t.title)}</strong> is <em>${t.status}</em></span>
    </li>`;
  }).join('');
}

// ── Create Task ──
async function createTask() {
  const title = document.getElementById('new-task-title').value.trim();
  if (!title) return toast('Enter a task title', 'error');
  const priority = parseInt(document.getElementById('new-task-priority').value);
  try {
    await api('/v1/tasks', {
      method: 'POST',
      body: JSON.stringify({ title, priority, description: '' }),
    });
    document.getElementById('new-task-title').value = '';
    toast('Task created', 'success');
    await fetchDashboard();
  } catch (e) {
    toast('Failed to create task: ' + e.message, 'error');
  }
}

// ── Task Modal ──
function openTaskModal(taskId) {
  const t = DASHBOARD_STATE.tasks.find(x => x.id === taskId);
  if (!t) return;
  MODAL_TASK_ID = taskId;
  document.getElementById('modal-title').textContent = escapeHtml(t.title);
  document.getElementById('modal-desc').textContent = t.description || '—';
  document.getElementById('modal-status').textContent = t.status;
  document.getElementById('modal-status-select').value = t.status;

  // Populate assignee dropdown
  const sel = document.getElementById('modal-assignee');
  sel.innerHTML = '<option value="">— unassigned —</option>' +
    DASHBOARD_STATE.agents.map(a =>
      `<option value="${a.id}" ${a.id === t.assignee ? 'selected' : ''}>${escapeHtml(a.name || a.id)}</option>`
    ).join('');
  document.getElementById('task-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('task-modal').classList.remove('open');
  MODAL_TASK_ID = null;
}

async function saveTask() {
  if (!MODAL_TASK_ID) return;
  const assignee = document.getElementById('modal-assignee').value;
  const status = document.getElementById('modal-status-select').value;
  try {
    await api(`/v1/tasks/${MODAL_TASK_ID}`, {
      method: 'PATCH',
      body: JSON.stringify({ assignee: assignee || null, status }),
    });
    toast('Task updated', 'success');
    closeModal();
    await fetchDashboard();
  } catch (e) {
    toast('Failed to update task: ' + e.message, 'error');
  }
}

// Allow clicking outside modal to close
document.getElementById('task-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Helpers ──
function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// ── Init ──
loadMode();
fetchDashboard();
REFRESH_INTERVAL = setInterval(fetchDashboard, 10000);
</script>
</body>
