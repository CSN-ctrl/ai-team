<script>
// ── AI Team Dashboard — Mode Routing + Task Management ──
(function(){
'use strict';

const CEO_BASE = 'http://localhost:8282';
const MODE_KEY = 'aiteam_mode';
const PANEL_KEY = 'dash_panel_open';
const MODE_HEADER = 'X-AI-Mode';
const CONV_HEADER = 'X-Conversation-Id';
const REFRESH_MS = 8000;

// ── State ──
const state = {
  mode: localStorage.getItem(MODE_KEY) || 'auto',
  panelOpen: true,
  tasks: [],
  agents: [],
  goals: [],
  epics: [],
  loading: false,
  agentLoading: false,
  error: null,
  editTaskId: null,
  refreshTimer: null,
  agentTimer: null,
  convId: localStorage.getItem('aiteam_conv_id') || ('conv-' + Math.random().toString(36).slice(2, 14)),
};

// ── DOM refs (warm after DOM ready) ──
let $ = (s) => document.querySelector(s);
let $$ = (s) => document.querySelectorAll(s);

// ── API ──
async function api(path, opts = {}) {
  const url = path.startsWith('http') ? path : CEO_BASE + path;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (!res.ok) {
    const text = await res.text().catch(() => res.statusText);
    throw new Error(`API ${res.status}: ${text.slice(0, 100)}`);
  }
  return res.json();
}

function showError(msg) {
  state.error = msg;
  const el = document.getElementById('dash-error-toast') || (()=>{
    const e = document.createElement('div');
    e.id = 'dash-error-toast';
    e.className = 'dash-error-toast';
    document.body.appendChild(e);
    return e;
  })();
  e.textContent = msg;
  e.style.display = 'block';
  setTimeout(() => { e.style.display = 'none'; state.error = null; }, 4000);
}

// ── Mode Management ──
function setMode(mode) {
  state.mode = mode;
  localStorage.setItem(MODE_KEY, mode);
  window.__aiMode = mode;
  document.body.dataset.mode = mode;

  document.querySelectorAll('.dash-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  const label = document.getElementById('dash-mode-label');
  if (label) label.textContent = mode.charAt(0).toUpperCase() + mode.slice(1);

  const ci = document.getElementById('dash-code-indicator');
  if (ci) ci.style.display = mode === 'code' ? 'inline-flex' : 'none';

  window.dispatchEvent(new CustomEvent('ai-mode-change', { detail: { mode } }));

  if (mode === 'plan') checkPlanPopup();
}

function checkPlanPopup() {
  const input = document.querySelector('textarea:not([class*="dash"]):not([id*="dash"])');
  if (input && input.value && input.value.trim().length > 5) {
    showPlanPopup(input.value.trim());
  }
}

function showPlanPopup(text) {
  const existing = document.getElementById('dash-plan-popup');
  if (existing) existing.remove();
  const popup = document.createElement('div');
  popup.id = 'dash-plan-popup';
  popup.className = 'dash-plan-popup';
  popup.innerHTML = `<p>📋 Create a plan from your message?</p>
    <div class="dash-plan-popup-actions">
      <button class="dash-btn dash-btn-sm" id="dash-plan-cancel">Not now</button>
      <button class="dash-btn dash-btn-sm dash-btn-primary" id="dash-plan-confirm">Create Plan</button>
    </div>`;
  const modeSection = document.querySelector('.dash-mode-section');
  if (modeSection) {
    modeSection.style.position = 'relative';
    modeSection.appendChild(popup);
  }
  document.getElementById('dash-plan-cancel')?.addEventListener('click', () => popup.remove());
  document.getElementById('dash-plan-confirm')?.addEventListener('click', () => {
    popup.remove();
    sendPlanRequest(text);
  });
  setTimeout(() => popup.remove(), 8000);
}

async function sendPlanRequest(text) {
  try {
    const res = await api('/v1/chat/completions', {
      method: 'POST',
      body: JSON.stringify({
        model: 'qwen/qwen3-next-80b-a3b-instruct',
        messages: [{ role: 'user', content: text }],
        temperature: 0.3,
        max_tokens: 4096,
        stream: false,
      }),
      headers: { [MODE_HEADER]: 'plan', [CONV_HEADER]: state.convId },
    });
    const planText = res?.choices?.[0]?.message?.content || '';
    if (planText) {
      showPlanResult(planText);
      setTimeout(refreshTasks, 1500);
    }
  } catch (e) {
    showError('Plan request failed: ' + e.message);
  }
}

function showPlanResult(text) {
  const modalBody = document.getElementById('dash-modal-body');
  const overlay = document.getElementById('dash-modal-overlay');
  if (!modalBody || !overlay) return;
  modalBody.innerHTML = `<div class="dash-modal-field">
    <div class="dash-modal-label">Generated Plan</div>
    <div class="dash-modal-value" style="white-space:pre-wrap;font-size:12px;line-height:1.5;max-height:50vh;overflow-y:auto">${escHtml(text)}</div>
  </div>
  <div class="dash-modal-actions">
    <button class="dash-btn dash-btn-primary" id="dash-plan-execute-btn">▶ Execute Plan</button>
    <button class="dash-btn" id="dash-plan-dismiss-btn">Dismiss</button>
  </div>`;
  overlay.style.display = 'flex';
  document.getElementById('dash-plan-execute-btn')?.addEventListener('click', () => {
    setMode('code');
    overlay.style.display = 'none';
  });
  document.getElementById('dash-plan-dismiss-btn')?.addEventListener('click', () => {
    overlay.style.display = 'none';
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Task Rendering ──
function renderTasks() {
  const columns = {
    backlog: document.getElementById('cards-backlog'),
    planning: document.getElementById('cards-planning'),
    in_progress: document.getElementById('cards-in_progress'),
    done: document.getElementById('cards-done'),
  };

  const counts = { backlog: 0, planning: 0, in_progress: 0, done: 0 };
  const colKeys = Object.keys(columns);

  // Reset all columns
  colKeys.forEach(k => {
    if (columns[k]) columns[k].innerHTML = '';
    const countEl = document.getElementById('kc-' + k);
    if (countEl) countEl.textContent = '0';
  });

  // If CEO is disconnected
  if (state.error && state.tasks.length === 0) {
    colKeys.forEach(k => {
      if (columns[k]) columns[k].innerHTML = '<div class="dash-connecting"><div class="spinner"></div><span>Connecting to CEO...</span></div>';
    });
    return;
  }

  if (state.loading && state.tasks.length === 0) {
    colKeys.forEach(k => {
      if (columns[k]) columns[k].innerHTML = '<div class="kanban-loading">Loading...</div>';
    });
    return;
  }

  state.tasks.forEach(task => {
    const status = task.status || 'backlog';
    const col = columns[status];
    if (!col) return;
    counts[status]++;

    const prio = task.priority || 3;
    const prioClass = 'p' + prio;
    const prioLabel = 'P' + prio;

    const card = document.createElement('div');
    card.className = 'kanban-card';
    card.dataset.taskId = task.id;

    const assignee = task.assignee || '';

    card.innerHTML = `<div class="kanban-card-title" title="${escHtml(task.title)}">${escHtml(task.title)}</div>
      <div class="kanban-card-meta">
        <span class="kanban-card-prio ${prioClass}">${prioLabel}</span>
        ${assignee ? `<span class="kanban-card-assignee">${escHtml(assignee)}</span>` : ''}
      </div>`;

    card.addEventListener('click', () => showTaskDetail(task.id));
    col.appendChild(card);
  });

  // Show empty states
  colKeys.forEach(k => {
    const col = columns[k];
    if (col && counts[k] === 0 && !state.loading && !state.error) {
      col.innerHTML = '<div class="kanban-empty">No tasks</div>';
    }
    const countEl = document.getElementById('kc-' + k);
    if (countEl) countEl.textContent = counts[k];
  });

  document.getElementById('dash-total-tasks').textContent = state.tasks.length;
  updateRefreshIndicator(false);
}

function updateRefreshIndicator(loading) {
  const ind = document.getElementById('dash-refresh-indicator');
  if (ind) ind.classList.toggle('loading', loading);
}

// ── Task Detail Modal ──
async function showTaskDetail(taskId) {
  const overlay = document.getElementById('dash-modal-overlay');
  const body = document.getElementById('dash-modal-body');
  if (!overlay || !body) return;

  body.innerHTML = '<div class="kanban-loading">Loading...</div>';
  overlay.style.display = 'flex';

  try {
    const task = await api('/v1/tasks/' + taskId);
    const prio = task.priority || 3;
    const prioLabel = 'P' + prio;
    const statusColors = {
      backlog: 'rgba(100,100,150,0.2)', planning: 'rgba(128,32,208,0.2)', in_progress: 'rgba(255,200,50,0.2)', review: 'rgba(50,150,255,0.2)', qa: 'rgba(255,100,50,0.2)', security: 'rgba(255,50,100,0.2)', approval: 'rgba(200,50,255,0.2)', done: 'rgba(50,200,100,0.2)', cancelled: 'rgba(100,100,100,0.2)',
    };
    const statusColor = statusColors[task.status] || 'rgba(100,100,150,0.2)';
    const statusLabel = (task.status || 'backlog').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

    body.innerHTML = `<div class="dash-modal-field">
        <div class="dash-modal-label">Title</div>
        <div class="dash-modal-value" style="font-weight:600">${escHtml(task.title)}</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <span class="badge-p${prio}">${prioLabel}</span>
        <span class="badge-status" style="background:${statusColor}">${statusLabel}</span>
        ${task.assignee ? `<span style="padding:2px 8px;border-radius:4px;background:rgba(128,32,208,0.12);color:#b060f0;font-size:11px">${escHtml(task.assignee)}</span>` : '<span style="padding:2px 8px;border-radius:4px;background:rgba(255,255,255,0.05);color:#9080a8;font-size:11px">Unassigned</span>'}
      </div>
      <div class="dash-modal-field">
        <div class="dash-modal-label">Description</div>
        <div class="dash-modal-value" style="font-size:12px">${task.description ? escHtml(task.description) : '<span style="color:#9080a8">No description</span>'}</div>
      </div>
      <div class="dash-modal-field">
        <div class="dash-modal-label">Created</div>
        <div class="dash-modal-value" style="font-size:11px">${task.created_at ? new Date(task.created_at).toLocaleString() : '-'}</div>
      </div>
      <div class="dash-modal-field">
        <div class="dash-modal-label">Epic ID</div>
        <div class="dash-modal-value" style="font-size:11px">${task.epic_id || '-'}</div>
      </div>
      <div class="dash-modal-actions">
        <button class="dash-btn dash-btn-sm dash-btn-outline" data-action="assign-eng-a">Assign eng-a</button>
        <button class="dash-btn dash-btn-sm dash-btn-outline" data-action="assign-eng-b">Assign eng-b</button>
        <button class="dash-btn dash-btn-sm dash-btn-outline" data-action="move-planning">→ Planning</button>
        <button class="dash-btn dash-btn-sm dash-btn-outline" data-action="move-in_progress">→ In Progress</button>
        <button class="dash-btn dash-btn-sm dash-btn-outline" data-action="move-done">→ Done</button>
      </div>`;

    // Wire up modal actions
    body.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const action = btn.dataset.action;
        try {
          if (action.startsWith('assign-')) {
            const agent = action.replace('assign-', '');
            await api('/v1/tasks/assign', { method: 'POST', body: JSON.stringify({ task_id: taskId, assignee: agent }) });
          } else if (action.startsWith('move-')) {
            const newStatus = action.replace('move-', '');
            await api('/v1/tasks/' + taskId, { method: 'PATCH', body: JSON.stringify({ status: newStatus }) });
          }
          overlay.style.display = 'none';
          setTimeout(refreshTasks, 300);
        } catch (e) {
          showError('Action failed: ' + e.message);
        }
      });
    });
  } catch (e) {
    body.innerHTML = `<div style="color:#ff5050;padding:20px;text-align:center">Error: ${escHtml(e.message)}</div>`;
  }
}

// ── Agents Rendering ──
function renderAgents() {
  const list = document.getElementById('dash-agents-list');
  const summary = document.getElementById('dash-agents-summary');
  if (!list) return;

  if (state.agentLoading && state.agents.length === 0) {
    list.innerHTML = '<span style="font-size:10px;color:#9080a8">Loading agents...</span>';
    return;
  }

  const busy = state.agents.filter(a => a.status === 'busy').length;
  if (summary) summary.textContent = `${busy}/${state.agents.length} busy`;

  list.innerHTML = state.agents.map(a => `<div class="dash-agent-item">
    <span class="dash-agent-dot ${a.status || 'idle'}"></span>
    <span class="dash-agent-name">${escHtml(a.id)}</span>
    ${a.current_task_id ? `<span class="dash-agent-task">${escHtml(a.current_task_id.slice(0,8))}</span>` : ''}
  </div>`).join('') || '<span style="font-size:10px;color:#9080a8">No agents</span>';
}

// ── Data Fetching ──
async function refreshTasks() {
  if (state.loading) return;
  state.loading = true;
  updateRefreshIndicator(true);

  try {
    const tasks = await api('/v1/tasks');
    state.tasks = tasks;
    state.error = null;
  } catch (e) {
    state.error = e.message;
    if (state.tasks.length === 0) {
      // Show connecting state on first load
    }
  } finally {
    state.loading = false;
    renderTasks();
  }
}

async function refreshAgents() {
  state.agentLoading = true;
  try {
    const agents = await api('/v1/agents');
    state.agents = agents;
  } catch (e) {
    // Silently fail on agent fetch
  } finally {
    state.agentLoading = false;
    renderAgents();
  }
}

// ── Quick Create ──
function setupQuickCreate() {
  const titleInput = document.getElementById('dash-task-title');
  const createBtn = document.getElementById('dash-create-btn');
  const extras = document.getElementById('dash-create-extras');
  const cancelBtn = document.getElementById('dash-create-cancel');
  const submitBtn = document.getElementById('dash-create-submit');
  const descInput = document.getElementById('dash-task-desc');
  const prioSelect = document.getElementById('dash-task-priority');
  const epicSelect = document.getElementById('dash-task-epic');

  if (!titleInput || !createBtn) return;

  createBtn.addEventListener('click', () => {
    const title = titleInput.value.trim();
    if (!title) return;
    if (extras && extras.style.display === 'none') {
      extras.style.display = 'flex';
      createBtn.textContent = 'Submit';
      descInput?.focus();
      // Load epics
      api('/v1/goals').then(goals => {
        state.goals = goals;
        if (epicSelect) {
          epicSelect.innerHTML = '<option value="">No epic</option>' + goals.map(g => `<option value="${g.id}">${escHtml(g.text.slice(0,30))}</option>`).join('');
        }
      }).catch(() => {});
      return;
    }
    doCreateTask(title, descInput?.value || '', parseInt(prioSelect?.value || '2'), epicSelect?.value || '');
  });

  if (cancelBtn) {
    cancelBtn.addEventListener('click', () => {
      if (extras) extras.style.display = 'none';
      createBtn.textContent = 'Create';
      titleInput.value = '';
    });
  }

  if (submitBtn) {
    submitBtn.addEventListener('click', () => {
      const title = titleInput.value.trim();
      if (!title) return;
      doCreateTask(title, descInput?.value || '', parseInt(prioSelect?.value || '2'), epicSelect?.value || '');
    });
  }

  titleInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && titleInput.value.trim()) {
      e.preventDefault();
      createBtn.click();
    }
  });
}

async function doCreateTask(title, desc, priority, epicId) {
  const titleInput = document.getElementById('dash-task-title');
  const extras = document.getElementById('dash-create-extras');
  const createBtn = document.getElementById('dash-create-btn');

  try {
    await api('/v1/tasks', {
      method: 'POST',
      body: JSON.stringify({ title, description: desc, priority, epic_id: epicId }),
    });
    if (titleInput) titleInput.value = '';
    if (extras) extras.style.display = 'none';
    if (createBtn) createBtn.textContent = 'Create';
    const descInput = document.getElementById('dash-task-desc');
    if (descInput) descInput.value = '';
    setTimeout(refreshTasks, 300);
  } catch (e) {
    showError('Failed to create task: ' + e.message);
  }
}

// ── Panel Toggle ──
function togglePanel(open) {
  state.panelOpen = open;
  const panel = document.getElementById('dash-panel');
  const btn = document.getElementById('dash-floating-btn');
  if (panel) {
    panel.classList.toggle('dash-collapsed', !open);
    panel.style.display = open ? '' : '';
  }
  if (btn) btn.style.display = open ? 'none' : '';
  localStorage.setItem(PANEL_KEY, open ? '1' : '0');
}

// ── Init ──
function init() {
  // Restore panel state
  const savedPanel = localStorage.getItem(PANEL_KEY);
  if (savedPanel === '0') togglePanel(false);

  // Store conv ID
  localStorage.setItem('aiteam_conv_id', state.convId);

  // Fetch intercept: add mode + conv headers to /api/ calls
  const origFetch = window.fetch;
  window.fetch = function(url, opts) {
    opts = opts || {};
    opts.headers = opts.headers || {};
    if (typeof url === 'string' && (url.includes('/api/') || url.includes(':8282'))) {
      opts.headers[MODE_HEADER] = state.mode;
      opts.headers[CONV_HEADER] = state.convId;
    }
    return origFetch.call(window, url, opts);
  };

  // ── Mode pills ──
  document.querySelectorAll('.dash-pill').forEach(b => {
    b.addEventListener('click', () => {
      const mode = b.dataset.mode;
      setMode(mode);
      // If plan was clicked, check chat input for content
      if (mode === 'plan') {
        setTimeout(() => checkPlanPopup(), 100);
      }
    });
  });

  // Panel controls
  document.getElementById('dash-minimize-btn')?.addEventListener('click', () => togglePanel(false));
  document.getElementById('dash-close-btn')?.addEventListener('click', () => togglePanel(false));
  document.getElementById('dash-floating-btn')?.addEventListener('click', () => togglePanel(true));
  document.getElementById('dash-refresh-btn')?.addEventListener('click', refreshTasks);

  // Modal close
  document.getElementById('dash-modal-close-btn')?.addEventListener('click', () => {
    document.getElementById('dash-modal-overlay').style.display = 'none';
  });
  document.getElementById('dash-modal-overlay')?.addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.target.style.display = 'none';
  });

  // Action buttons
  document.getElementById('dash-new-goal-btn')?.addEventListener('click', () => {
    const text = prompt('What is the goal?');
    if (text && text.trim()) {
      api('/v1/goals', { method: 'POST', body: JSON.stringify({ text: text.trim(), description: text.trim() }) })
        .then(() => refreshTasks())
        .catch(e => showError('Goal creation failed: ' + e.message));
    }
  });

  document.getElementById('dash-plan-request-btn')?.addEventListener('click', () => {
    const text = prompt('Describe what you want to build:');
    if (text && text.trim()) {
      sendPlanRequest(text.trim());
    }
  });

  // Setup quick create
  setupQuickCreate();

  // Restore mode
  setMode(state.mode);

  // Initial fetch
  refreshTasks();
  refreshAgents();

  // Auto-refresh tasks
  state.refreshTimer = setInterval(refreshTasks, REFRESH_MS);
  state.agentTimer = setInterval(refreshAgents, REFRESH_MS * 2);
}

// Wait for DOM
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
